services:
  file-gateway:
    build: .
    container_name: file-gateway
    env_file:
      - .env
    volumes:
      # 공유폴더 마운트
      # 테스트: 로컬 test_storage 사용
      # 연구실: /home/lab/shared:/storage 로 변경
      - ./test_storage:/storage
      # C1 fix: state.json 을 볼륨에 마운트 → 컨테이너 재시작 시 상태 유지
      - ./state.json:/app/state.json
    environment:
      - BASE_STORAGE_PATH=/storage
      - STATE_FILE=/app/state.json
    restart: unless-stopped
