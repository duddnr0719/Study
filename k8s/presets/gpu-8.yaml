apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod-8x
  labels:
    app: gpu-workload
    gpu-count: "8"
spec:
  restartPolicy: Never
  containers:
  - name: gpu-container
    image: nvidia/cuda:12.3.0-runtime-ubuntu22.04
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/gpu: "8"
      requests:
        nvidia.com/gpu: "8"
        memory: "64Gi"
        cpu: "32"
    env:
    - name: NVIDIA_VISIBLE_DEVICES
      value: "all"
    - name: NVIDIA_DRIVER_CAPABILITIES
      value: "compute,utility"
  nodeSelector:
    accelerator: nvidia-gpu
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
