apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

nameSuffix: "-8gpu"

commonLabels:
  gpu-count: "8"

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gpu-workload
      spec:
        template:
          spec:
            containers:
            - name: gpu-container
              resources:
                limits:
                  nvidia.com/gpu: "8"
                requests:
                  nvidia.com/gpu: "8"
                  memory: "64Gi"
                  cpu: "32"
