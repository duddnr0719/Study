apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

nameSuffix: "-2gpu"

commonLabels:
  gpu-count: "2"

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gpu-workload
      spec:
        template:
          spec:
            containers:
            - name: gpu-container
              resources:
                limits:
                  nvidia.com/gpu: "2"
                requests:
                  nvidia.com/gpu: "2"
                  memory: "16Gi"
                  cpu: "8"
